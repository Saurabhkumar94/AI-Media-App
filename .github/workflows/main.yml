name: Fullstack CI/CD Final

on:
  push:
    branches: [ "main" ]

jobs:
  # 1. Backend Job (Java/Maven)
  backend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test Backend
        working-directory: ./backend
        run: |
          # 1. Sabse pehle source classes ko compile karke symbols generate karein
          mvn clean compile
          
          # 2. Phir project ko local repository mein install karein taaki symbols link ho jayein
          mvn install -DskipTests
          
          # 3. Ab actual tests aur report generate karenge
          mvn test jacoco:report

  # 2. Frontend Job (Node.js)
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './media-frontend/package-lock.json'

      - name: Install and Build Frontend
        working-directory: ./media-frontend
        run: |
          npm install
          npm run build --if-present